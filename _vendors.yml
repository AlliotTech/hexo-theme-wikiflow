# Optional third-party frontend assets.
#
# Values in theme config can be false, "cdn", "local", or a custom URL.
# "local" is only used when the corresponding file exists in source/libs;
# otherwise the resolver falls back to the CDN URL.

fontawesome:
  type: style
  name: font-awesome
  version: 4.7.0
  default: cdn
  cdn: https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css
  local: libs/font-awesome/css/font-awesome.min.css

open_sans:
  type: style
  name: open-sans
  version: 1
  default: false
  cdn: https://fonts.googleapis.com/css?family=Open+Sans:400,600,700
  local: libs/open-sans/styles.css

source_code_pro:
  type: style
  name: source-code-pro
  version: 1
  default: false
  cdn: https://fonts.googleapis.com/css?family=Source+Code+Pro:400,600
  local: libs/source-code-pro/styles.css

mathjax:
  type: script
  name: mathjax
  version: 2.7.1
  default: https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/MathJax.js?config=TeX-AMS-MML_HTMLorMML
  cdn: https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/MathJax.js?config=TeX-AMS-MML_HTMLorMML

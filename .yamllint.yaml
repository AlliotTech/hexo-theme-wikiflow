extends: default

ignore: |
  pnpm-lock.yaml

rules:
  comments: disable
  comments-indentation: disable
  document-start: disable
  empty-lines:
    max: 1
    max-end: 0
  indentation:
    spaces: 2
    indent-sequences: true
    check-multi-line-strings: false
  line-length: disable
  truthy: disable

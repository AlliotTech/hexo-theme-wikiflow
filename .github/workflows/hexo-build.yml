name: Hexo Build

on: [push, pull_request]

permissions:
  contents: read

jobs:
  generate:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.19.0'

      - name: Install dependencies
        run: npm install

      - name: Generate Hexo fixture
        run: node tools/verify-hexo8-site.js
